# =============================================================================
# Nginx para servidor Ubuntu — publicado em uma unica porta externa (8082)
#
# docker-compose.vm.yml mapeia "${FRONTEND_HTTP_PORT:-8082}:443", ou seja, a
# porta externa 8082 encaminha para o bloco HTTPS (443) deste arquivo, com o
# certificado autoassinado gerado no build da imagem (ver CERT_SAN_IP em
# frontend/Dockerfile e docker-compose.vm.yml). Camera e GPS exigem contexto
# seguro (HTTPS) em qualquer origem que nao seja localhost.
#
# O bloco "listen 80" abaixo fica acessivel apenas dentro da rede Docker
# (nao e publicado no host) — mantido para health check interno e para o
# cenario alternativo de proxy reverso externo fazendo HTTPS.
# =============================================================================

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # Headers de seguranca
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy      "camera=(self), geolocation=(self), microphone=()" always;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy para a API FastAPI
    location ~ ^/(auth|users|vehicles|trips|reports|photos|geocoding|health|signup-requests) {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # index.html nunca cachear (PWA atualiza corretamente)
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Assets estaticos — cache longo (Vite gera hash no nome)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name _;

    client_max_body_size 20m;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    # Headers de seguranca
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy      "camera=(self), geolocation=(self), microphone=()" always;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy para a API FastAPI
    location ~ ^/(auth|users|vehicles|trips|reports|photos|geocoding|health|signup-requests) {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # index.html nunca cachear (PWA atualiza corretamente)
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Assets estaticos — cache longo (Vite gera hash no nome)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
