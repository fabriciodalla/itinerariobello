# =============================================================================
# nginx de producao — Itinerario Bello
# Troque SEU_DOMINIO.COM.BR pelo dominio real em todos os lugares abaixo.
# =============================================================================

# Redireciona HTTP -> HTTPS
server {
    listen 80;
    server_name SEU_DOMINIO.COM.BR;

    return 301 https://$host$request_uri;
}

# Servidor principal HTTPS
server {
    listen 443 ssl;
    server_name SEU_DOMINIO.COM.BR;

    # Certificados gerados pelo certbot (Let's Encrypt)
    # Os arquivos sao montados via volume no docker-compose.prod.yml
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Tamanho maximo de upload (fotos de hodometro)
    client_max_body_size 20m;

    # Headers de seguranca
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy      "camera=(self), geolocation=(self), microphone=()" always;

    root  /usr/share/nginx/html;
    index index.html;

    # Proxy para a API FastAPI — todas as rotas do backend
    location ~ ^/(auth|users|vehicles|trips|reports|photos|geocoding|health|signup-requests) {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # index.html — nunca cachear (para o PWA atualizar corretamente)
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Manifest e service worker — cache curto para permitir atualizacoes
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Assets estaticos — cache longo (Vite gera hash no nome do arquivo)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — todas as rotas do React
    location / {
        try_files $uri $uri/ /index.html;
    }
}
