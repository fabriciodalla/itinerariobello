name: itinerario-bello-vm

# =============================================================================
# Docker Compose para servidor Ubuntu externo — porta 8082
#
# Comandos:
#   docker compose --env-file .env.production -f docker-compose.vm.yml config
#   docker compose --env-file .env.production -f docker-compose.vm.yml up -d --build
#   docker compose --env-file .env.production -f docker-compose.vm.yml exec api alembic upgrade head
#   docker compose --env-file .env.production -f docker-compose.vm.yml exec api python seed_producao.py
# =============================================================================

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itinerario_bello_vm_api
    environment:
      APP_ENV: ${APP_ENV:?defina APP_ENV em .env.production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:?defina DATABASE_URL em .env.production}
      PHOTOS_DIR: ${PHOTOS_DIR:-/app/storage/photos}
      CORS_ORIGINS: ${CORS_ORIGINS:?defina CORS_ORIGINS em .env.production}
      SECRET_KEY: ${SECRET_KEY:?defina SECRET_KEY em .env.production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      REVERSE_GEOCODING_ENABLED: ${REVERSE_GEOCODING_ENABLED:-false}
      REVERSE_GEOCODING_PROVIDER: ${REVERSE_GEOCODING_PROVIDER:-nominatim}
      REVERSE_GEOCODING_TIMEOUT_SECONDS: ${REVERSE_GEOCODING_TIMEOUT_SECONDS:-3}
      REVERSE_GEOCODING_USER_AGENT: ${REVERSE_GEOCODING_USER_AGENT:-itinerario-bello-vm/1.0}
      NOMINATIM_REVERSE_URL: ${NOMINATIM_REVERSE_URL:-https://nominatim.openstreetmap.org/reverse}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?defina FRONTEND_BASE_URL em .env.production}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-60}
      SMTP_HOST: ${SMTP_HOST:?defina SMTP_HOST em .env.production}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:?defina SMTP_FROM_EMAIL em .env.production}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Itinerario Bello}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-10}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    expose:
      - "8000"
    volumes:
      - fotos_vm:/app/storage/photos
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itinerario_bello_vm_frontend
    ports:
      - "${FRONTEND_HTTP_PORT:-8082}:80"
    volumes:
      - ./frontend/nginx.vm.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: itinerario_bello_vm_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-itinerario_bello}
      POSTGRES_USER: ${POSTGRES_USER:-bello}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD em .env.production}
    expose:
      - "5432"
    volumes:
      - postgres_vm:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_vm:
    name: itinerario_bello_vm_postgres
  fotos_vm:
    name: itinerario_bello_vm_fotos
