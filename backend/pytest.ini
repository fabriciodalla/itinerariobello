[pytest]
testpaths = app/tests
python_files = test_*.py
python_functions = test_*
addopts = -ra --strict-markers
markers =
    risco(peso, criticidade, area, referencias): metadados obrigatorios para auditoria de risco do teste
    autenticacao: testes de autenticacao, sessao e token
    permissao: testes de autorizacao por perfil
    viagem: testes do ciclo de vida da viagem
    foto: testes de foto do hodometro
    gps: testes de GPS obrigatorio
    km: testes de quilometragem
    aprovacao: testes legados de aprovacao e regras do fechamento mensal
    relatorio: testes de relatorios e exportacao
    infra: testes de infraestrutura tecnica da API
    modelo_dados: testes de models, migrations e estrutura do banco
